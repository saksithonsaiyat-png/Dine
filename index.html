<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartDine - ระบบจัดการร้านอาหาร</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ICON COMPONENT (Inline SVGs for performance in single file) ---
        const Icons = {
            Utensils: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>,
            Bell: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
            ChefHat: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>,
            Users: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            X: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
            ArrowLeft: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>,
            Clock: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            DollarSign: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
            LayoutGrid: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>,
            ShoppingBag: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>,
            Check: (props) => <svg {...props} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        };

        const Icon = ({ name, size = 20, className }) => {
            const IconComp = Icons[name];
            return IconComp ? <IconComp width={size} height={size} className={className} /> : null;
        };

        // --- MOCK DATA ---
        const INITIAL_MENU = [
            { id: 1, name: 'ต้มยำกุ้งน้ำข้น', price: 250, category: 'ต้ม/แกง', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSTvORHpTIaX2iy0LA6_1OjNZoq2gLV5rwPzHNDY_4zFg&s=10', description: 'กุ้งแม่น้ำตัวโต น้ำซุปเข้มข้น หอมเครื่องสมุนไพร' },
            { id: 2, name: 'ผัดไทยกุ้งสด', price: 120, category: 'จานเดียว', image: 'https://images.unsplash.com/photo-1559314809-0d155014e29e?auto=format&fit=crop&w=400&q=80', description: 'เส้นจันท์เหนียวนุ่ม รสชาติกลมกล่อม' },
            { id: 3, name: 'ส้มตำไทย', price: 80, category: 'ยำ/ตำ', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTkO_7lJiNGS09uEKODhflJQySBSaQ64PiDjW-NxwtIxw&s=10', description: 'มะละกอกรอบ รสชาติเปรี้ยวหวาน เผ็ดกำลังดี' },
            { id: 4, name: 'ไก่ย่างสมุนไพร', price: 180, category: 'ย่าง/ทอด', image: 'https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=400&q=80', description: 'ไก่หมักเครื่องเทศย่างถ่าน หอมกรุ่น' },
            { id: 5, name: 'ข้าวผัดปู', price: 150, category: 'จานเดียว', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTYvoEk_SK43yHEGQU0R41gwwnzX-r7qUZHgu8O_ygm9A&s=10', description: 'ข้าวหอมมะลิผัดเนื้อปูก้อนโต' },
            { id: 6, name: 'ปลากะพงทอดน้ำปลา', price: 450, category: 'ย่าง/ทอด', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRARC7Rq-KADhE_0LFg1G7dwU5vJ1hWqPWU1vwuuT1s-g&s=10', description: 'ปลากะพงสดทอดกรอบ ราดน้ำปลาปรุงรส' },
            { id: 7, name: 'น้ำแตงโมปั่น', price: 60, category: 'เครื่องดื่ม', image: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSNq_VKJIOUylbmDnd_txi11plg9H_9jg2ABCmn9SoxwQ&s=10', description: 'หวานเย็นชื่นใจ ดับกระหาย' },
        ];

        const TABLES = [
            { id: 'A1', name: 'โต๊ะ A1', zone: 'Indoor' },
            { id: 'A2', name: 'โต๊ะ A2', zone: 'Indoor' },
            { id: 'B1', name: 'โต๊ะ B1', zone: 'Outdoor' },
            { id: 'B2', name: 'โต๊ะ B2', zone: 'Outdoor' },
        ];

        const CATEGORIES = ['ทั้งหมด', 'ต้ม/แกง', 'จานเดียว', 'ยำ/ตำ', 'ย่าง/ทอด', 'เครื่องดื่ม'];

        // --- APP COMPONENT ---
        function App() {
            // State
            const [view, setView] = useState('landing');
            const [currentTable, setCurrentTable] = useState(null);
            const [orders, setOrders] = useState([]);
            const [cart, setCart] = useState([]);
            const [notifications, setNotifications] = useState([]);
            const [activeTab, setActiveTab] = useState('ทั้งหมด');
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [itemOptions, setItemOptions] = useState({ spicy: 'ปกติ', note: '' });

            // Actions
            const addToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id && i.spicy === itemOptions.spicy && i.note === itemOptions.note);
                    if (existing) {
                        return prev.map(i => i === existing ? { ...i, quantity: i.quantity + 1 } : i);
                    }
                    return [...prev, { ...item, quantity: 1, spicy: itemOptions.spicy, note: itemOptions.note }];
                });
                setSelectedItem(null);
                setItemOptions({ spicy: 'ปกติ', note: '' });
            };

            const placeOrder = () => {
                if (cart.length === 0) return;
                const newOrder = {
                    orderId: `ORD-${Math.floor(Math.random() * 10000)}`,
                    tableId: currentTable.id,
                    items: cart,
                    status: 'pending',
                    timestamp: new Date(),
                };
                setOrders(prev => [...prev, newOrder]);
                setCart([]);
                setIsCartOpen(false);
                alert('ส่งออเดอร์เรียบร้อยครับ! ครัวได้รับรายการแล้ว');
            };

            const callStaff = (type) => {
                const newNotif = {
                    id: Date.now(),
                    tableId: currentTable.id,
                    type: type,
                    message: type === 'bill' ? 'ขอเช็คบิล' : 'เรียกพนักงาน',
                    time: new Date()
                };
                setNotifications(prev => [...prev, newNotif]);
                alert(type === 'bill' ? 'แจ้งเช็คบิลแล้ว กรุณารอสักครู่' : 'พนักงานกำลังไปที่โต๊ะครับ');
            };

            const updateOrderStatus = (orderId, newStatus) => {
                setOrders(prev => prev.map(o => o.orderId === orderId ? { ...o, status: newStatus } : o));
            };

            const clearNotification = (id) => {
                setNotifications(prev => prev.filter(n => n.id !== id));
            };

            const closeTableBill = (tableId) => {
                setOrders(prev => prev.map(o => o.tableId === tableId ? { ...o, status: 'paid' } : o));
                setNotifications(prev => prev.filter(n => n.tableId !== tableId));
                alert(`ปิดบิลโต๊ะ ${tableId} เรียบร้อย`);
            };

            // Computed
            const activeOrders = orders.filter(o => o.status !== 'paid');
            const kitchenOrders = activeOrders.filter(o => o.status === 'pending' || o.status === 'cooking');
            
            const getTableStatus = (tableId) => {
                const tableOrders = activeOrders.filter(o => o.tableId === tableId);
                const tableNotifs = notifications.filter(n => n.tableId === tableId);
                if (tableNotifs.some(n => n.type === 'bill')) return 'payment';
                if (tableOrders.length > 0) return 'occupied';
                return 'free';
            };

            // --- VIEWS ---
            
            // 1. Landing View
            if (view === 'landing') {
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6 text-white relative overflow-hidden">
                        <div className="absolute inset-0 bg-gradient-to-br from-orange-500/20 to-purple-600/20 z-0"></div>
                        <div className="z-10 text-center max-w-md w-full animate-fade-in">
                            <div className="w-20 h-20 bg-orange-500 rounded-2xl mx-auto flex items-center justify-center mb-6 shadow-lg shadow-orange-500/30">
                                <Icon name="Utensils" size={40} className="text-white" />
                            </div>
                            <h1 className="text-4xl font-bold mb-2">ครัวดุ๊กดุ๋ย</h1>
                            <p className="text-gray-400 mb-10">ครัวดุ๊กดุ๋ยยินดีต้อนรับ</p>

                            <div className="space-y-4">
                                <div className="bg-gray-800/50 p-6 rounded-2xl border border-gray-700 backdrop-blur-sm">
                                    <h3 className="text-lg font-semibold mb-4 text-orange-400 flex items-center justify-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 7h.01"/><path d="M7 12h.01"/><path d="M7 17h.01"/><path d="M12 7h.01"/><path d="M12 12h.01"/><path d="M12 17h.01"/><path d="M17 7h.01"/><path d="M17 12h.01"/><path d="M17 17h.01"/></svg>
                                        สแกน QR Code (ลูกค้า)
                                    </h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {TABLES.map(table => (
                                            <button key={table.id} onClick={() => { setCurrentTable(table); setView('customer'); }} 
                                                className="p-3 bg-gray-700 hover:bg-orange-600 rounded-xl transition-colors flex flex-col items-center group">
                                                <span className="font-bold group-hover:text-white">{table.name}</span>
                                                <span className="text-xs text-gray-400 group-hover:text-gray-200">{table.zone}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 gap-4 pt-4 border-t border-gray-800">
                                    <button onClick={() => setView('kitchen')} className="p-4 bg-blue-600 hover:bg-blue-700 rounded-xl flex flex-col items-center justify-center gap-2 font-semibold transition-transform active:scale-95">
                                        <Icon name="ChefHat" size={24} /> ครัว
                                    </button>
                                    <button onClick={() => setView('staff')} className="p-4 bg-purple-600 hover:bg-purple-700 rounded-xl flex flex-col items-center justify-center gap-2 font-semibold transition-transform active:scale-95">
                                        <Icon name="Users" size={24} /> พนักงาน
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // 2. Customer View
            if (view === 'customer') {
                const filteredMenu = activeTab === 'ทั้งหมด' ? INITIAL_MENU : INITIAL_MENU.filter(m => m.category === activeTab);
                const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const myOrders = orders.filter(o => o.tableId === currentTable.id && o.status !== 'paid');

                return (
                    <div className="min-h-screen bg-gray-50 pb-24 animate-fade-in">
                        {/* Header */}
                        <div className="bg-white sticky top-0 z-20 shadow-sm px-4 py-3 flex justify-between items-center">
                            <div>
                                <h2 className="font-bold text-lg text-gray-800">SmartDine</h2>
                                <div className="flex items-center gap-1 text-sm text-orange-600 font-medium">
                                    <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                    {currentTable.name} ({currentTable.zone})
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => callStaff('call')} className="p-2 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600"><Icon name="Bell" size={20}/></button>
                                <button onClick={() => setView('landing')} className="p-2 rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600"><Icon name="ArrowLeft" size={20}/></button>
                            </div>
                        </div>

                        {/* Categories */}
                        <div className="overflow-x-auto py-4 px-4 flex gap-3 no-scrollbar sticky top-14 bg-gray-50 z-10">
                            {CATEGORIES.map(cat => (
                                <button key={cat} onClick={() => setActiveTab(cat)} className={`whitespace-nowrap px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === cat ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200'}`}>
                                    {cat}
                                </button>
                            ))}
                        </div>

                        {/* Menu List */}
                        <div className="px-4 grid grid-cols-1 gap-4">
                            {filteredMenu.map(item => (
                                <div key={item.id} className="bg-white rounded-2xl p-3 shadow-sm flex gap-4 border border-gray-100" onClick={() => setSelectedItem(item)}>
                                    <div className="w-24 h-24 rounded-xl overflow-hidden flex-shrink-0 bg-gray-200 relative">
                                        <img src={item.image} alt={item.name} className="w-full h-full object-cover" loading="lazy" />
                                    </div>
                                    <div className="flex-1 flex flex-col justify-between">
                                        <div>
                                            <h3 className="font-bold text-gray-800 leading-tight mb-1">{item.name}</h3>
                                            <p className="text-xs text-gray-400 line-clamp-2">{item.description}</p>
                                        </div>
                                        <div className="flex justify-between items-end mt-2">
                                            <span className="font-bold text-orange-600 text-lg">฿{item.price}</span>
                                            <button className="bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Bottom Bar */}
                        <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 pb-8 z-30 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                            {myOrders.length > 0 && (
                                <div className="mb-3 flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                    {myOrders.map(order => (
                                        <div key={order.orderId} className="flex-shrink-0 bg-blue-50 border border-blue-100 px-3 py-2 rounded-lg text-sm min-w-[120px]">
                                            <div className="flex items-center gap-1 text-blue-700 font-bold text-xs mb-1">
                                                <Icon name="Clock" size={12} /> {order.timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                            </div>
                                            <div className={`text-xs font-medium px-2 py-0.5 rounded-full inline-block ${order.status === 'pending' ? 'bg-yellow-100 text-yellow-700' : order.status === 'cooking' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}`}>
                                                {order.status === 'pending' ? 'รอคิว' : order.status === 'cooking' ? 'กำลังทำ' : 'เสิร์ฟแล้ว'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            <div className="flex gap-3">
                                <button onClick={() => callStaff('bill')} className="flex-1 border border-gray-300 text-gray-700 font-bold py-3 rounded-xl hover:bg-gray-50 active:scale-95 transition-transform">เช็คบิล</button>
                                <button onClick={() => setIsCartOpen(true)} className="flex-[2] bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-orange-600/30 flex justify-between px-6 hover:bg-orange-700 active:scale-95 transition-all">
                                    <span>ตะกร้า ({cart.reduce((a,b)=>a+b.quantity,0)})</span>
                                    <span>฿{cartTotal}</span>
                                </button>
                            </div>
                        </div>

                        {/* Product Modal */}
                        {selectedItem && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-end sm:items-center justify-center p-4 backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-sm rounded-3xl p-6 relative animate-slide-up">
                                    <button onClick={() => setSelectedItem(null)} className="absolute top-4 right-4 p-2 bg-gray-100 rounded-full"><Icon name="X" size={16}/></button>
                                    <div className="flex gap-4 mb-4">
                                        <img src={selectedItem.image} className="w-20 h-20 rounded-xl object-cover" />
                                        <div>
                                            <h3 className="text-xl font-bold">{selectedItem.name}</h3>
                                            <div className="text-orange-600 font-bold text-lg">฿{selectedItem.price}</div>
                                        </div>
                                    </div>
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-sm font-semibold text-gray-600 block mb-2">ระดับความเผ็ด</label>
                                            <div className="flex gap-2">
                                                {['ไม่เผ็ด', 'ปกติ', 'เผ็ดมาก'].map(lvl => (
                                                    <button key={lvl} onClick={() => setItemOptions({...itemOptions, spicy: lvl})} className={`flex-1 py-2 rounded-lg text-sm border transition-colors ${itemOptions.spicy === lvl ? 'border-orange-500 bg-orange-50 text-orange-700 font-bold' : 'border-gray-200'}`}>{lvl}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-sm font-semibold text-gray-600 block mb-2">ข้อความถึงครัว</label>
                                            <input type="text" placeholder="เช่น ไม่ใส่ผักชี" className="w-full border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-orange-500" value={itemOptions.note} onChange={(e) => setItemOptions({...itemOptions, note: e.target.value})} />
                                        </div>
                                        <button onClick={() => addToCart(selectedItem)} className="w-full bg-orange-600 text-white font-bold py-3 rounded-xl mt-4 active:scale-95 transition-transform">เพิ่มลงตะกร้า</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Cart Modal */}
                        {isCartOpen && (
                            <div className="fixed inset-0 bg-black/50 z-50 flex items-end justify-center backdrop-blur-sm animate-fade-in">
                                <div className="bg-white w-full max-w-lg rounded-t-3xl p-6 h-[80vh] flex flex-col animate-slide-up">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-xl font-bold">รายการที่เลือก</h2>
                                        <button onClick={() => setIsCartOpen(false)} className="p-2 bg-gray-100 rounded-full"><Icon name="X" size={20}/></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                                        {cart.length === 0 ? <div className="text-center text-gray-400 mt-20">ยังไม่มีรายการอาหาร</div> : 
                                            cart.map((item, idx) => (
                                                <div key={idx} className="flex justify-between items-start border-b border-gray-100 pb-4">
                                                    <div className="flex gap-3">
                                                        <div className="bg-gray-100 w-8 h-8 rounded flex items-center justify-center font-bold text-sm">{item.quantity}x</div>
                                                        <div>
                                                            <div className="font-bold text-gray-800">{item.name}</div>
                                                            <div className="text-xs text-gray-500">เผ็ด: {item.spicy} {item.note && `, ${item.note}`}</div>
                                                        </div>
                                                    </div>
                                                    <div className="font-bold text-gray-700">฿{item.price * item.quantity}</div>
                                                </div>
                                            ))
                                        }
                                    </div>
                                    <div className="mt-4 border-t border-gray-100 pt-4">
                                        <div className="flex justify-between text-lg font-bold mb-4"><span>ยอดรวม</span><span className="text-orange-600">฿{cartTotal}</span></div>
                                        <button onClick={placeOrder} disabled={cart.length === 0} className="w-full bg-green-600 disabled:bg-gray-300 text-white font-bold py-4 rounded-xl text-lg shadow-lg active:scale-95 transition-transform">ยืนยันการสั่งอาหาร</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // 3. Kitchen View
            if (view === 'kitchen') {
                return (
                    <div className="min-h-screen bg-slate-900 text-white p-6 animate-fade-in">
                        <div className="flex justify-between items-center mb-8 sticky top-0 bg-slate-900 z-10 py-4 border-b border-slate-800">
                            <h1 className="text-3xl font-bold flex items-center gap-3"><Icon name="ChefHat" className="text-orange-400" size={32} /> Kitchen Display</h1>
                            <button onClick={() => setView('landing')} className="px-4 py-2 bg-slate-800 rounded-lg hover:bg-slate-700 text-sm">ออก</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
                            {kitchenOrders.length === 0 && <div className="col-span-full text-center py-20 text-slate-600 text-xl">ไม่มีออเดอร์ค้างในระบบ</div>}
                            {kitchenOrders.map(order => (
                                <div key={order.orderId} className={`rounded-xl border-l-4 overflow-hidden shadow-lg ${order.status === 'pending' ? 'bg-slate-800 border-yellow-500' : 'bg-slate-800 border-orange-500'}`}>
                                    <div className={`p-3 flex justify-between items-center ${order.status === 'pending' ? 'bg-yellow-500/10' : 'bg-orange-500/10'}`}>
                                        <div><div className="text-xl font-bold">{TABLES.find(t=>t.id===order.tableId)?.name}</div><div className="text-xs opacity-70">#{order.orderId}</div></div>
                                        <div className="text-right"><div className="font-mono font-bold text-lg">{order.timestamp.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div></div>
                                    </div>
                                    <div className="p-4 space-y-3">
                                        {order.items.map((item, idx) => (
                                            <div key={idx} className="flex justify-between items-start border-b border-slate-700 pb-2 last:border-0">
                                                <div className="flex gap-2">
                                                    <span className="font-bold text-orange-400 text-lg">{item.quantity}</span>
                                                    <div><div className="font-medium">{item.name}</div>{(item.spicy !== 'ปกติ' || item.note) && <div className="text-sm text-yellow-300">{item.spicy !== 'ปกติ' && `• ${item.spicy} `} {item.note && `• ${item.note}`}</div>}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="p-3 bg-slate-900/50">
                                        {order.status === 'pending' ? 
                                            <button onClick={() => updateOrderStatus(order.orderId, 'cooking')} className="w-full py-3 bg-yellow-600 hover:bg-yellow-500 text-white font-bold rounded-lg">รับออเดอร์ / เริ่มทำ</button> :
                                            <button onClick={() => updateOrderStatus(order.orderId, 'served')} className="w-full py-3 bg-green-600 hover:bg-green-500 text-white font-bold rounded-lg">เสร็จแล้ว / พร้อมเสิร์ฟ</button>
                                        }
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            // 4. Staff View
            if (view === 'staff') {
                return (
                    <div className="min-h-screen bg-gray-100 font-sans flex flex-col md:flex-row animate-fade-in">
                        {/* Sidebar */}
                        <div className="w-full md:w-64 bg-white shadow-xl z-20 flex-shrink-0 flex flex-col h-screen overflow-hidden">
                            <div className="p-6 border-b border-gray-100">
                                <h1 className="text-2xl font-bold text-purple-700 flex items-center gap-2"><Icon name="Users" /> Staff / POS</h1>
                                <button onClick={() => setView('landing')} className="text-sm text-gray-500 mt-2 hover:text-gray-800">กลับหน้าหลัก</button>
                            </div>
                            <div className="p-4 flex-1 overflow-y-auto">
                                <h3 className="text-xs font-bold text-gray-400 uppercase mb-3">การแจ้งเตือน ({notifications.length})</h3>
                                <div className="space-y-2">
                                    {notifications.length === 0 && <div className="text-sm text-gray-400 text-center py-4">ไม่มีการแจ้งเตือน</div>}
                                    {notifications.map(n => (
                                        <div key={n.id} className={`p-3 rounded-xl border-l-4 shadow-sm animate-fade-in ${n.type === 'bill' ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}`}>
                                            <div className="flex justify-between items-start mb-1">
                                                <span className="font-bold text-gray-800">{TABLES.find(t=>t.id===n.tableId)?.name}</span>
                                                <button onClick={() => clearNotification(n.id)} className="text-gray-400 hover:text-gray-600"><Icon name="X" size={14}/></button>
                                            </div>
                                            <div className={`text-sm font-medium ${n.type === 'bill' ? 'text-green-700' : 'text-red-700'}`}>{n.message}</div>
                                            <div className="text-xs text-gray-400 mt-1">{n.time.toLocaleTimeString()}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        {/* Main Content */}
                        <div className="flex-1 p-6 overflow-y-auto h-screen">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icon name="LayoutGrid" /></div>
                                    <div><div className="text-2xl font-bold">{TABLES.length}</div><div className="text-sm text-gray-500">โต๊ะทั้งหมด</div></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-orange-100 flex items-center justify-center text-orange-600"><Icon name="ShoppingBag" /></div>
                                    <div><div className="text-2xl font-bold">{activeOrders.length}</div><div className="text-sm text-gray-500">ออเดอร์ Active</div></div>
                                </div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center gap-4">
                                    <div className="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600"><Icon name="DollarSign" /></div>
                                    <div><div className="text-2xl font-bold">฿{orders.filter(o=>o.status==='paid').reduce((sum,o) => sum + o.items.reduce((s,i)=>s+(i.price*i.quantity),0),0)}</div><div className="text-sm text-gray-500">ยอดขายวันนี้</div></div>
                                </div>
                            </div>
                            <h2 className="text-xl font-bold text-gray-800 mb-4">ผังร้าน / สถานะโต๊ะ</h2>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {TABLES.map(table => {
                                    const status = getTableStatus(table.id);
                                    const tableOrders = activeOrders.filter(o => o.tableId === table.id);
                                    const total = tableOrders.reduce((sum, o) => sum + o.items.reduce((s, i) => s + (i.price * i.quantity), 0), 0);
                                    
                                    let cardClass = 'bg-white border-gray-200';
                                    let statusBadge = 'bg-gray-100 text-gray-500';
                                    let statusText = 'ว่าง';

                                    if (status === 'occupied') { cardClass = 'bg-blue-50 border-blue-200'; statusBadge = 'bg-blue-200 text-blue-700'; statusText = 'มีลูกค้า'; }
                                    else if (status === 'payment') { cardClass = 'bg-green-50 border-green-200 ring-2 ring-green-400'; statusBadge = 'bg-green-200 text-green-700 animate-pulse'; statusText = 'รอเช็คบิล'; }

                                    return (
                                        <div key={table.id} className={`rounded-xl p-4 border shadow-sm transition-all hover:shadow-md flex flex-col justify-between h-48 ${cardClass}`}>
                                            <div>
                                                <div className="flex justify-between items-start mb-2"><span className="font-bold text-lg">{table.name}</span><span className={`px-2 py-0.5 rounded text-xs font-bold ${statusBadge}`}>{statusText}</span></div>
                                                <div className="text-sm text-gray-500 mb-4">{table.zone}</div>
                                            </div>
                                            {tableOrders.length > 0 ? (
                                                <div>
                                                    <div className="flex justify-between text-sm mb-1 text-gray-600"><span>รายการ</span><span>{tableOrders.length} Order</span></div>
                                                    <div className="flex justify-between font-bold text-lg mb-3"><span>ยอดรวม</span><span>฿{total}</span></div>
                                                    <button onClick={() => { if(confirm(`ยืนยันการปิดบิล ${table.name} ยอด ${total} บาท?`)) closeTableBill(table.id); }} className="w-full py-2 bg-gray-800 text-white rounded-lg text-sm font-bold hover:bg-gray-700">ชำระเงิน / ปิดบิล</button>
                                                </div>
                                            ) : <div className="text-center text-gray-400 text-sm mt-auto">พร้อมบริการ</div>}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
